{% extends "layout.html" %}
{% block title %}Login – OmniChain Gateway{% endblock %}

{% block auth_content %}
<div class="login-wrapper">

  <!-- Floating particles -->
  <div class="particles" id="particles"></div>

  <div class="login-card" id="loginCard">

    <!-- Glowing orb behind logo -->
    <div class="login-glow-orb"></div>

    <div class="login-logo">
      <div class="login-logo-icon" id="logoIcon">⛓</div>
      <div class="login-title">OmniChain Gateway</div>
      <div class="login-subtitle">Hybrid Web3 Enterprise Platform</div>
    </div>

    <!-- Divider -->
    <div class="login-divider">
      <span></span><span class="divider-text">Secure Access</span><span></span>
    </div>

    <div id="statusBox" class="status-box hidden mb-2"></div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="username" class="form-control form-control-icon" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" class="form-control form-control-icon" placeholder="Enter password" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-full login-btn-animated">
        <span id="loginSpinner" class="spinner hidden"></span>
        <span id="loginText">🚀 Secure Login</span>
      </button>
    </form>

    <div class="demo-creds">
      <div class="demo-creds-title">🔑 Hackathon Demo Accounts</div>
      <div class="demo-cred-row">
        Admin <span>admin / admin123</span>
        <button class="quick-fill-btn" onclick="quickFill('admin','admin123')">Fill</button>
      </div>
      <div class="demo-cred-row">
        Public User <span>public / public123</span>
        <button class="quick-fill-btn" onclick="quickFill('public','public123')">Fill</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Quick fill ──────────────────────────────────────────────────────────
function quickFill(u, p) {
  const uEl = document.getElementById('username');
  const pEl = document.getElementById('password');
  uEl.value = ''; pEl.value = '';
  let i = 0;
  const typeU = setInterval(() => { uEl.value += u[i++]; if (i >= u.length) { clearInterval(typeU); let j = 0; const typeP = setInterval(() => { pEl.value += p[j++]; if (j >= p.length) clearInterval(typeP); }, 60); } }, 60);
}

// ── Floating particles ───────────────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${4 + Math.random() * 6}px;
      height: ${4 + Math.random() * 6}px;
      animation-duration: ${6 + Math.random() * 12}s;
      animation-delay: ${-Math.random() * 10}s;
      opacity: ${0.2 + Math.random() * 0.5};
    `;
    container.appendChild(p);
  }
})();

// ── Login submit with cinematic exit ────────────────────────────────────
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn     = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const loginTxt = document.getElementById('loginText');
  const statusBox = document.getElementById('statusBox');
  const card = document.getElementById('loginCard');

  btn.disabled = true;
  spinner.classList.remove('hidden');
  loginTxt.textContent = 'Authenticating...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();

    if (data.redirect) {
      // ── CINEMATIC SEQUENCE ──
      loginTxt.textContent = '✓ Verified';
      btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
      btn.style.boxShadow = '0 8px 28px rgba(16,185,129,0.5)';
      spinner.classList.add('hidden');

      // 1. Success pulse on card (green glow)
      card.classList.add('login-success-pulse');

      // 2. Logo spin
      document.getElementById('logoIcon').classList.add('logo-launch');

      // 3. Immediately start the dark overlay rising — this covers everything
      //    so the user never sees white. Card launch happens behind it.
      setTimeout(() => {
        triggerTransition(() => { window.location.href = data.redirect; });
      }, 350);

      // 4. Card zooms out (happens behind the darkening overlay)
      setTimeout(() => { card.classList.add('card-launch'); }, 380);

      // placeholder to keep structure
      const _noop = true;

    } else {
      // Shake card on error
      card.classList.add('card-shake');
      setTimeout(() => card.classList.remove('card-shake'), 600);

      statusBox.className = 'status-box error mb-2';
      statusBox.textContent = '❌ ' + data.error;
      btn.disabled = false;
      spinner.classList.add('hidden');
      loginTxt.textContent = '🚀 Secure Login';
    }
  } catch(err) {
    statusBox.className = 'status-box error mb-2';
    statusBox.textContent = 'Network error. Is the server running?';
    btn.disabled = false;
    spinner.classList.add('hidden');
    loginTxt.textContent = '🚀 Secure Login';
  }
});

// ── Input focus glow ──────────────────────────────────────────────────────
document.querySelectorAll('.form-control').forEach(inp => {
  inp.addEventListener('focus', () => inp.parentElement.classList.add('input-focused'));
  inp.addEventListener('blur',  () => inp.parentElement.classList.remove('input-focused'));
});
</script>
{% endblock %}
