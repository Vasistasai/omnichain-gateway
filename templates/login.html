{% extends "layout.html" %}
{% block title %}Login – OmniChain Gateway{% endblock %}

{% block auth_content %}
<div class="login-wrapper">
  <div class="particles" id="particles"></div>

  <div class="login-card" id="loginCard">
    <div class="login-glow-orb"></div>

    <div class="login-logo">
      <div class="login-logo-icon" id="logoIcon">⛓</div>
      <div class="login-title">OmniChain Gateway</div>
      <div class="login-subtitle">Hybrid Web3 Enterprise Platform</div>
    </div>

    <!-- Tab Switcher -->
    <div style="display:flex; background:rgba(255,255,255,0.05); border-radius:12px; padding:4px; margin-bottom:1.5rem;">
      <button id="tabLogin" onclick="switchTab('login')" style="flex:1; padding:0.6rem; border:none; border-radius:8px; background: var(--primary); color:#fff; font-weight:bold; cursor:pointer; transition:all 0.2s;">Login</button>
      <button id="tabSignup" onclick="switchTab('signup')" style="flex:1; padding:0.6rem; border:none; border-radius:8px; background:transparent; color:var(--text-secondary); font-weight:bold; cursor:pointer; transition:all 0.2s;">Sign Up</button>
    </div>

    <div id="statusBox" class="status-box hidden mb-2"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUsername" class="form-control form-control-icon" placeholder="Enter username" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="loginPassword" class="form-control form-control-icon" placeholder="Enter password" autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-full login-btn-animated">
        <span id="loginSpinner" class="spinner hidden"></span>
        <span id="loginText">🚀 Secure Login</span>
      </button>
    </form>

    <!-- SIGNUP FORM (hidden initially) -->
    <form id="signupForm" autocomplete="on" style="display:none;">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-wrapper">
          <span class="input-icon">🪪</span>
          <input type="text" id="signupName" class="form-control form-control-icon" placeholder="Your full name" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input type="text" id="signupUsername" class="form-control form-control-icon" placeholder="Choose a username" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔑</span>
          <input type="password" id="signupPassword" class="form-control form-control-icon" placeholder="Min. 6 characters" required>
        </div>
      </div>
      <button type="submit" id="signupBtn" class="btn btn-primary btn-full login-btn-animated">
        <span id="signupSpinner" class="spinner hidden"></span>
        <span id="signupText">🌐 Create Wallet & Account</span>
      </button>
    </form>

    <div id="demoCreds" class="demo-creds">
      <div class="demo-creds-title">🔑 Demo Accounts</div>
      <div class="demo-cred-row">
        Admin <span>admin / admin123</span>
        <button class="quick-fill-btn" onclick="quickFill('admin','admin123')">Fill</button>
      </div>
      <div class="demo-cred-row">
        User <span>public / public123</span>
        <button class="quick-fill-btn" onclick="quickFill('public','public123')">Fill</button>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const demoCreds = document.getElementById('demoCreds');
  document.getElementById('statusBox').className = 'status-box hidden mb-2';

  if (tab === 'login') {
    loginForm.style.display = '';
    signupForm.style.display = 'none';
    demoCreds.style.display = '';
    tabLogin.style.background = 'var(--primary)';
    tabLogin.style.color = '#fff';
    tabSignup.style.background = 'transparent';
    tabSignup.style.color = 'var(--text-secondary)';
  } else {
    loginForm.style.display = 'none';
    signupForm.style.display = '';
    demoCreds.style.display = 'none';
    tabSignup.style.background = 'var(--primary)';
    tabSignup.style.color = '#fff';
    tabLogin.style.background = 'transparent';
    tabLogin.style.color = 'var(--text-secondary)';
  }
}

function quickFill(u, p) {
  const uEl = document.getElementById('loginUsername');
  const pEl = document.getElementById('loginPassword');
  uEl.value = ''; pEl.value = '';
  let i = 0;
  const typeU = setInterval(() => { uEl.value += u[i++]; if (i >= u.length) { clearInterval(typeU); let j = 0; const typeP = setInterval(() => { pEl.value += p[j++]; if (j >= p.length) clearInterval(typeP); }, 60); } }, 60);
}

(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;animation-duration:${6+Math.random()*12}s;animation-delay:${-Math.random()*10}s;opacity:${0.2+Math.random()*0.5};`;
    container.appendChild(p);
  }
})();

async function handleAuth(url, payload, btnId, spinnerId, textId, successText) {
  const btn = document.getElementById(btnId);
  const spinner = document.getElementById(spinnerId);
  const txt = document.getElementById(textId);
  const statusBox = document.getElementById('statusBox');
  const card = document.getElementById('loginCard');

  btn.disabled = true;
  spinner.classList.remove('hidden');
  txt.textContent = 'Processing...';

  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.redirect) {
      txt.textContent = '✓ ' + successText;
      btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
      spinner.classList.add('hidden');
      card.classList.add('login-success-pulse');
      document.getElementById('logoIcon').classList.add('logo-launch');
      setTimeout(() => { triggerTransition(() => { window.location.href = data.redirect; }); }, 350);
      setTimeout(() => { card.classList.add('card-launch'); }, 380);
    } else {
      card.classList.add('card-shake');
      setTimeout(() => card.classList.remove('card-shake'), 600);
      statusBox.className = 'status-box error mb-2';
      statusBox.textContent = '❌ ' + data.error;
      btn.disabled = false;
      spinner.classList.add('hidden');
      txt.textContent = successText;
    }
  } catch(err) {
    statusBox.className = 'status-box error mb-2';
    statusBox.textContent = 'Network error. Is the server running?';
    btn.disabled = false;
    spinner.classList.add('hidden');
    txt.textContent = successText;
  }
}

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleAuth('/api/auth', {
    username: document.getElementById('loginUsername').value,
    password: document.getElementById('loginPassword').value
  }, 'loginBtn', 'loginSpinner', 'loginText', '🚀 Secure Login');
});

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  await handleAuth('/api/register', {
    real_name: document.getElementById('signupName').value,
    username: document.getElementById('signupUsername').value,
    password: document.getElementById('signupPassword').value
  }, 'signupBtn', 'signupSpinner', 'signupText', '🌐 Create Wallet & Account');
});

document.querySelectorAll('.form-control').forEach(inp => {
  inp.addEventListener('focus', () => inp.parentElement.classList.add('input-focused'));
  inp.addEventListener('blur',  () => inp.parentElement.classList.remove('input-focused'));
});
</script>
{% endblock %}
