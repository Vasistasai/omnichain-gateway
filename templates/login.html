{% extends "layout.html" %}
{% block title %}Login – OmniChain Gateway{% endblock %}

{% block auth_content %}
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">⛓</div>
      <div class="login-title">OmniChain Gateway</div>
      <div class="login-subtitle">Hybrid Web3 Enterprise Platform</div>
    </div>

    <div id="statusBox" class="status-box hidden mb-2"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
        <span id="loginSpinner" class="spinner hidden"></span>
        <span id="loginText">Secure Login</span>
      </button>
    </form>

    <div class="demo-creds">
      <div class="demo-creds-title">🔑 Hackathon Demo Accounts</div>
      <div class="demo-cred-row">Admin: <span>admin / admin123</span></div>
      <div class="demo-cred-row">Public User: <span>public / public123</span></div>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const statusBox = document.getElementById('statusBox');

  btn.disabled = true;
  spinner.classList.remove('hidden');

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.redirect) {
      window.location.href = data.redirect;
    } else {
      statusBox.className = 'status-box error mb-2';
      statusBox.textContent = data.error;
    }
  } catch(err) {
    statusBox.className = 'status-box error mb-2';
    statusBox.textContent = 'Network error. Is the server running?';
  } finally {
    btn.disabled = false;
    spinner.classList.add('hidden');
  }
});
</script>
{% endblock %}
